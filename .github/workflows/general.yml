name: General tests

on:
  push:

env:
  CARGO_TERM_COLOR: always
  CARGO_PROFILE_TEST_DEBUG: 0 # See https://corrode.dev/blog/tips-for-faster-ci-builds/

jobs:
  build_and_test:
    name: Run tests
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        nvim-version: [v0.11.2]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust toolchain
        run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Build Teamtype
        run: cargo build --release
      - name: Add teamtype binary to PATH
        run: echo "$PWD/target/release" >> $GITHUB_PATH
      - run: teamtype --version
      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.nvim-version }}
      - run: nvim --version
      - name: Install Neovim plugin
        run: |
          mkdir -p $HOME/.local/share/nvim/site/pack/plugins/start
          ln -s $PWD/../nvim-plugin $HOME/.local/share/nvim/site/pack/plugins/start/teamtype
      - name: Compile unit tests
        run: cargo test --no-default-features --no-run --locked
      - name: Run unit tests
        run: cargo test --no-default-features
      - name: Compile integration tests
        working-directory: ./daemon/integration-tests
        run: cargo test --no-run --locked
      - name: Run integration tests
        working-directory: ./daemon/integration-tests
        run: cargo test
      - name: Run integration tests (without fuzzer)
        working-directory: ./daemon/integration-tests
        run: cargo test --test nvim-plugin
